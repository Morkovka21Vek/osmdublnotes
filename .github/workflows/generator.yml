name: Generator

on:
  workflow_dispatch:
    inputs:
      download:
        description: Download a fresh OSM dump
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Restore OSM dump cache
        if: ${{ !inputs.download }}
        uses: actions/cache@v4
        with:
          path: planet-notes-latest.osn
          key: osm-notes-dump

      - name: Download OSM notes dump  & Extract
        if: ${{ inputs.download || !hashFiles('planet-notes-latest.osn') }}
        run: |
          curl -L --fail \
            https://planet.openstreetmap.org/notes/planet-notes-latest.osn.bz2 \
            | bzip2 -dc > planet-notes-latest.osn

      - name: Check size
        run: ls -lh planet-notes-latest.osn

      - name: Run parser
        run: python3 src/parser.py

      - name: Upload notes
        uses: actions/upload-artifact@v7.0.1
        with:
          name: parser-output
          path: |
            notes.bin
            users.json
          retention-days: 3

  analysis:
    needs: download
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: parser-output

      - name: Generate json
        run: python3 src/generator.py

      - name: Upload by-users
        uses: actions/upload-artifact@v7.0.1
        with:
          name: by-users
          path: by_users.json
          retention-days: 1

  users:
    needs: download
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: parser-output

      - name: Split json
        run: python3 src/user-chunks.py

      - name: Upload users list
        uses: actions/upload-artifact@v7.0.1
        with:
          name: users-list
          path: users/
          retention-days: 1

  deploy:
    needs: 
      - users
      - analysis
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download by-users
        uses: actions/download-artifact@v8.0.1
        with:
          name: by-users

      - name: Download users list
        uses: actions/download-artifact@v8.0.1
        with:
          name: users-list
          path: users/

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: HTML/CSS/JS Minifier
        uses: docker://devatherock/minify-js:3.1.0
        with:
          add_suffix: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5


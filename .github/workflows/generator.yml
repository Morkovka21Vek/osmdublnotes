name: Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download OSM notes dump
        run: |
          curl -L --fail \
            -o planet-notes-latest.osn.bz2 \
            https://planet.openstreetmap.org/notes/planet-notes-latest.osn.bz2

      - name: Extract
        run: |
          bunzip2 planet-notes-latest.osn.bz2

      - name: Check size
        run: ls -lh planet-notes-latest.osn

      - name: Run parser
        run: python3 src/parser.py

      - name: Upload notes
        uses: actions/upload-artifact@v7.0.1
        with:
          name: osm-notes
          path: notes.bin
          retention-days: 3

      - name: Upload users
        uses: actions/upload-artifact@v7.0.1
        with:
          name: osm-users
          path: users.json
          retention-days: 3

  analysis:
    needs: download
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: osm-notes

      - name: Generate json
        run: python3 src/generator.py

      - name: Upload by-users
        uses: actions/upload-artifact@v7.0.1
        with:
          name: by-users
          path: by_users.json
          retention-days: 1

  users:
    needs: download
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: osm-users

      - name: Split json
        run: python3 src/user-chunks.py

      - name: Upload users list
        uses: actions/upload-artifact@v7.0.1
        with:
          name: users-list
          path: users/
          retention-days: 1

  push:
    needs: 
      - users
      - analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: data

      - name: Download by-users
        uses: actions/download-artifact@v8.0.1
        with:
          name: by-users

      - name: Download users list
        uses: actions/download-artifact@v8.0.1
        with:
          name: users-list

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add by_users.json users/
          git commit -m "chore: Update data" || echo "No changes"

          git push origin HEAD:data

